        // 简单的Markdown渲染函数
        function renderMarkdown(md) {
            let html = md;
            
            // 标题（注意顺序，从h4到h1）
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // 分隔线
            html = html.replace(/^---$/gm, '<hr>');
            
            // 加粗
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // 列表项
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            
            // 包裹连续的li为ul
            html = html.replace(/(<li>.*?<\/li>\n?)+/gs, '<ul>$&</ul>');
            
            // 段落（简化处理）
            html = html.split('\n\n').map(para => {

                const title = typeof a.title === 'object' ? a.title[currentLang] : a.title;
                const time = typeof a.time === 'object' ? a.time[currentLang] : a.time;
                const highlights = typeof a.highlights === 'object' ? a.highlights[currentLang] : a.highlights;
                
                return `
                <div class="activity-card" onclick="showDetail(${a.id})">
                    <div class="activity-header">
                        <div class="activity-platform">${a.platform}</div>
                        <div class="activity-title">${a.priority} ${title}</div>
                        <span class="activity-type">${a.type}</span>
                    </div>
                    <div class="activity-body">
                        <div class="activity-meta">
                            <div class="meta-item">
                                <div class="meta-label">${i18n[currentLang]['activity-time']}</div>
                                <div class="meta-value">${time}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">${i18n[currentLang]['activity-amount']}</div>
                                <div class="meta-value">${a.amount}</div>
                            </div>
                        </div>
                        <div class="activity-highlights">
                            <h4>${i18n[currentLang]['highlights']}</h4>
                            <ul>${highlights.slice(0,3).map(h => `<li>${h}</li>`).join('')}</ul>
                        </div>
                    </div>
                </div>
            `}).join('');
        }
        
        function showDetail(id) {
            const a = activities.find(x => x.id === id);
            const title = typeof a.title === 'object' ? a.title[currentLang] : a.title;
            const time = typeof a.time === 'object' ? a.time[currentLang] : a.time;
            const threshold = typeof a.threshold === 'object' ? a.threshold[currentLang] : a.threshold;
            const release = typeof a.release === 'object' ? a.release[currentLang] : a.release;
            const duration = typeof a.duration === 'object' ? a.duration[currentLang] : a.duration;
            const games = typeof a.games === 'object' ? a.games[currentLang] : a.games;
            const wagering = typeof a.wagering === 'object' ? a.wagering[currentLang] : a.wagering;
            const highlights = typeof a.highlights === 'object' ? a.highlights[currentLang] : a.highlights;
            
            document.getElementById('modalTitle').textContent = title;
            
            document.getElementById('tabSummary').innerHTML = `
                <div class="detail-section">
                    <h3>${i18n[currentLang]['basic-info']}</h3>
                    <div class="detail-grid">
                        <div class="detail-item"><strong>${i18n[currentLang]['platform']}</strong><span>${a.platform}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['type']}</strong><span>${a.type}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['time']}</strong><span>${time}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['priority']}</strong><span>${a.priority}</span></div>
                    </div>
                </div>
                <div class="detail-section">
                    <h3>${i18n[currentLang]['rules']}</h3>
                    <div class="detail-grid">
                        <div class="detail-item"><strong>${i18n[currentLang]['threshold']}</strong><span>${threshold}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['amount']}</strong><span>${a.amount}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['release']}</strong><span>${release}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['duration']}</strong><span>${duration}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['games']}</strong><span>${games}</span></div>
                        <div class="detail-item"><strong>${i18n[currentLang]['wagering']}</strong><span>${wagering}</span></div>
                    </div>
                </div>
                <div class="detail-section">
                    <h3>${i18n[currentLang]['innovation']}</h3>
                    <ul style="list-style:none;padding:0;">
                        ${highlights.map(h => `<li style="padding:0.5rem 0;padding-left:1.5rem;position:relative;">
                            <span style="position:absolute;left:0;color:#667eea;font-weight:bold;">✓</span>${h}
                        </li>`).join('')}
                    </ul>
                </div>
            `;
            
            const originalMd = originalTexts[a.file] || '原文加载中...';
            document.getElementById('tabOriginal').innerHTML = `
                <div class="original-content">${renderMarkdown(originalMd)}</div>
            `;
            
            document.getElementById('modal').classList.add('active');
            switchTab('summary');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'summary') {
                document.querySelector('[onclick*="summary"]').classList.add('active');
                document.getElementById('tabSummary').classList.add('active');
            } else {
                document.querySelector('[onclick*="original"]').classList.add('active');
                document.getElementById('tabOriginal').classList.add('active');
            }
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const filter = this.dataset.filter;
                const value = this.dataset.value;
                document.querySelectorAll(`[data-filter="${filter}"]`).forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                filters[filter] = value;
                render();
            });
        });
        
        document.getElementById('searchBox').addEventListener('input', e => {
            filters.search = e.target.value;
            render();
        });
        
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target.id === 'modal') closeModal();
        });
        
        render();
    </script>
</body>
</html>
